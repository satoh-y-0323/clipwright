name: Test

# Run quality gate (ruff + mypy + pytest) on all workspace packages
# across Linux, macOS, and Windows.
#
# FFmpeg is installed via each platform's package manager.
# whisper-cli (clipwright-transcribe) and scenedetect CLI (clipwright-scene
# pyscenedetect backend) are not installed; those e2e tests auto-skip when
# the binaries are absent.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        run: uv python install 3.11

      # -----------------------------------------------------------------------
      # FFmpeg — required by most packages (silence / loudness / noise /
      # transcribe / render / scene).  Each platform installs the system package.
      # -----------------------------------------------------------------------
      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      # -----------------------------------------------------------------------
      # Install all workspace packages + all optional extras.
      # --all-extras installs [vad] (numpy/onnxruntime/silero-vad) for
      # clipwright-silence and [pyscenedetect] for clipwright-scene.
      # clipwright-silence vad tests require numpy to be importable; without
      # it the mocks that call numpy.frombuffer etc. cannot work.
      # -----------------------------------------------------------------------
      - name: Sync workspace
        run: uv sync --all-packages --all-extras --dev

      # -----------------------------------------------------------------------
      # Quality gate: run ruff + mypy + pytest for every package.
      # Runs in a bash subshell per package so cd does not affect siblings.
      # On Windows, GitHub Actions provides Git Bash when shell: bash is set.
      # -----------------------------------------------------------------------
      - name: Quality gate — all packages
        shell: bash
        run: |
          set -e
          PACKAGES=(
            "."
            "clipwright-silence"
            "clipwright-loudness"
            "clipwright-noise"
            "clipwright-transcribe"
            "clipwright-bgm"
            "clipwright-frames"
            "clipwright-render"
            "clipwright-scene"
            "clipwright-speed"
            "clipwright-stabilize"
            "clipwright-text"
            "clipwright-wrap"
            "clipwright-color"
          )
          # Note: clipwright-stabilize unit tests mock ffmpeg entirely and do not
          # require a libvidstab-enabled ffmpeg build (policy A). Integration/e2e
          # tests that exercise the real vidstabdetect/vidstabtransform filters are
          # marked @pytest.mark.integration and auto-skipped when libvidstab is
          # absent. Real libvidstab validation is performed on the dev machine via
          # clipwright_test e2e (see CLAUDE.md §4).
          for pkg in "${PACKAGES[@]}"; do
            echo "======================================================="
            echo "Package: $pkg"
            echo "======================================================="
            (
              cd "$pkg"
              uv run ruff format --check .
              uv run ruff check .
              uv run mypy src
              uv run pytest
            )
          done
