name: Publish to PyPI

# Triggered when a tag matching v*.*.* is pushed (e.g. v0.1.2).
# Publishes every workspace package (core + members) via PyPI Trusted
# Publishing (OIDC) - no API token required.
#
# One-time setup per package on PyPI (Manage -> Publishing -> Add publisher):
#   Owner:         satoh-y-0323
#   Repository:    clipwright
#   Workflow name: publish.yml
#   Environment:   pypi
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+a[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+b[0-9]+'
  workflow_dispatch:

jobs:
  publish:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      # Keep publishing the remaining packages even if one fails, so a single
      # already-uploaded version does not abort the whole release.
      fail-fast: false
      matrix:
        package:
          - clipwright
          - clipwright-bgm
          - clipwright-color
          - clipwright-export
          - clipwright-frames
          - clipwright-loudness
          - clipwright-noise
          - clipwright-reframe
          - clipwright-render
          - clipwright-scene
          - clipwright-overlay
          - clipwright-sequence
          - clipwright-transition
          - clipwright-silence
          - clipwright-speed
          - clipwright-stabilize
          - clipwright-text
          - clipwright-transcribe
          - clipwright-trim
          - clipwright-wrap
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.package }}
    permissions:
      id-token: write  # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build ${{ matrix.package }}
        # Build only this matrix package into a clean dist/ so the publish step
        # uploads exactly one distribution set.
        run: uv build --package ${{ matrix.package }} --out-dir dist

      - name: Publish ${{ matrix.package }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Skip versions already on PyPI so a partial-failure rerun (or a
          # dispatch on an already-released tag) succeeds instead of erroring.
          skip-existing: true

  # Create a GitHub Release for the pushed tag (once, after PyPI publish).
  # publish.yml only publishes to PyPI; without this job the Releases page
  # lags behind the tags. Release notes are taken from the matching CHANGELOG
  # section so the suite version (tag == CHANGELOG heading) stays in sync.
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    # Only on tag pushes (skip plain workflow_dispatch on a branch).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # create releases
    steps:
      - uses: actions/checkout@v5

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          # Pull the body between "## [<version>]" and the next "## [" heading.
          # Use literal prefix matching (index) to avoid dynamic-regex escaping.
          awk -v hdr="## [$version]" '
            index($0, hdr) == 1 { flag = 1; next }
            flag && index($0, "## [") == 1 { flag = 0 }
            flag { print }
          ' CHANGELOG.md > notes.md
          # Trim leading/trailing blank lines.
          sed -i -e '/./,$!d' notes.md
          if [ ! -s notes.md ]; then
            printf 'Release %s. See CHANGELOG.md for details.\n' "$TAG" > notes.md
          fi
          # Mark prerelease tags (rc/a/b) accordingly.
          case "$TAG" in
            *rc[0-9]*|*a[0-9]*|*b[0-9]*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)                            echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ steps.notes.outputs.prerelease }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping."
            exit 0
          fi
          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$TAG" --verify-tag --prerelease \
              --title "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" --verify-tag --latest \
              --title "$TAG" --notes-file notes.md
          fi
